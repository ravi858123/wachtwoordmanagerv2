name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'           # bijv. v2.0, v2.1.3 → triggert ook release-job
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────
  #  1. Build (altijd: push + PR)
  # ─────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout broncode
        uses: actions/checkout@v4

      - name: Stel JDK 17 in
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Stel Gradle in (cache + build-scan)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Maak gradlew uitvoerbaar
        run: chmod +x gradlew

      - name: Compileer (debug)
        run: ./gradlew assembleDebug --stacktrace

      # Versienummer uit build.gradle halen voor artifact-naam
      - name: Lees versienaam
        id: versie
        run: |
          NAAM=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "naam=$NAAM" >> $GITHUB_OUTPUT

      - name: Upload debug-APK als artifact
        uses: actions/upload-artifact@v4
        with:
          name: wachtwoordmanager-v${{ steps.versie.outputs.naam }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  #  2. Release (alleen bij een v* tag)
  # ─────────────────────────────────────────────
  release:
    name: Maak GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write   # nodig voor het aanmaken van releases

    steps:
      - name: Checkout broncode
        uses: actions/checkout@v4

      - name: Stel JDK 17 in
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Stel Gradle in
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Maak gradlew uitvoerbaar
        run: chmod +x gradlew

      # ── Optioneel: signeer de release-APK met een keystore ──
      # Zet KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      # als GitHub Actions Secrets in je repo-instellingen.
      - name: Decodeer keystore (indien aanwezig)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Compileer release-APK
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && 'keystore.jks' || '' }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Hernoem APK naar versie-tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv app/build/outputs/apk/release/app-release*.apk \
             app/build/outputs/apk/release/wachtwoordmanager-${TAG}.apk || true
          # Unsigned fallback
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/wachtwoordmanager-${TAG}-unsigned.apk 2>/dev/null || true

      - name: Publiceer GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Wachtwoordmanager ${{ github.ref_name }}"
          body: |
            ## 📦 Wachtwoordmanager ${{ github.ref_name }}

            ### Installeren
            1. Download de APK hieronder
            2. Schakel *Installatie uit onbekende bronnen* in op je Android-toestel
            3. Open de APK en installeer

            ### Wijzigingen
            _Zie [CHANGELOG.md](CHANGELOG.md) of de commit-historie voor details._

            ---
            > ⚠️ Dit is een zelf-gebouwde APK. Controleer altijd de bron voordat je installeert.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: app/build/outputs/apk/release/wachtwoordmanager-*.apk
